# Automated upstream-sync workflow for the GHCP fork.
#
# Pulls a selected colbymchenry/codegraph upstream ref into eggboy/codegraph main on a
# weekly cadence. When the rebase is clean → push directly. When upstream
# touched anything the fork also touched → invoke GitHub Copilot CLI to
# resolve the conflicts headless, then re-prove correctness via
# scripts/sync/verify.sh and open a PR for human review.
#
# Required repo secrets:
#   - RELEASE_PAT       Fine-grained PAT (contents:write) used for git push
#                       and PR creation. Re-uses the secret already wired
#                       for release.yml.
#   - COPILOT_CLI_PAT   Token accepted by Copilot CLI for LLM auth (fine-grained
#                       PAT with "Copilot Requests" or a GitHub CLI OAuth token).
#                       Passed as COPILOT_GITHUB_TOKEN and stripped from shell
#                       tool environments.
#
# Runbook + auth instructions: docs/SYNC.md

name: Sync upstream

on:
  schedule:
    # Mondays 09:00 UTC. Picks up the prior week's upstream work without
    # competing with the maintainer's first-thing-Monday review window.
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if a sync PR for the current upstream target already exists'
        type: boolean
        default: false
      model:
        description: 'Copilot model (defaults to gpt-5.5)'
        type: string
        default: gpt-5.5
      upstream_ref:
        description: 'Upstream branch/tag/SHA to sync (defaults to main; use v0.9.7 for incremental testing)'
        type: string
        default: main

concurrency:
  group: sync-upstream
  # Don't kill an in-flight LLM run — they can take several minutes and a
  # half-done rebase is messier than a queued one.
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

env:
  UPSTREAM_REMOTE_URL: https://github.com/colbymchenry/codegraph.git
  UPSTREAM_TARGET_REF: refs/remotes/upstream-sync/target
  SYNC_BRANCH_PREFIX: sync/upstream
  PR_LABEL: auto-sync
  COPILOT_CLI_VERSION: '1.0.59'

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history so the rebase against the selected upstream target has commits to
          # work with, and so the eventual push doesn't get rejected.
          fetch-depth: 0
          ref: main
          # SECURITY: Do NOT persist credentials into .git/config. The Copilot
          # CLI step runs with --allow-all; push/PR credentials are injected
          # explicitly only after the agent exits.
          persist-credentials: false

      - name: Prepare sync state dir
        run: mkdir -p /tmp/sync

      - name: Capture trusted Copilot prompt
        run: cp scripts/sync/copilot-resolve-prompt.md /tmp/sync/copilot-resolve-prompt.md

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        id: fetch
        env:
          REQUESTED_UPSTREAM_REF: ${{ inputs.upstream_ref || 'main' }}
        run: |
          if [[ "${REQUESTED_UPSTREAM_REF}" == -* ]]; then
            echo "::error::Invalid upstream ref '${REQUESTED_UPSTREAM_REF}'. Ref names must not start with dash."
            exit 1
          fi
          if ! [[ "${REQUESTED_UPSTREAM_REF}" =~ ^[A-Za-z0-9._/-]{1,120}$ ]]; then
            echo "::error::Invalid upstream ref '${REQUESTED_UPSTREAM_REF}'. Ref names may only contain letters, numbers, dot, underscore, slash, and dash."
            exit 1
          fi
          git remote add upstream "${UPSTREAM_REMOTE_URL}"
          git fetch upstream "${REQUESTED_UPSTREAM_REF}" --no-tags
          git update-ref "${UPSTREAM_TARGET_REF}" FETCH_HEAD
          UPSTREAM_SHA=$(git rev-parse "${UPSTREAM_TARGET_REF}")
          UPSTREAM_SHORT=$(git rev-parse --short=12 "${UPSTREAM_TARGET_REF}")
          {
            echo "upstream_ref=${REQUESTED_UPSTREAM_REF}"
            echo "upstream_sha=${UPSTREAM_SHA}"
            echo "upstream_short=${UPSTREAM_SHORT}"
          } >> "$GITHUB_OUTPUT"
          echo "Upstream ${REQUESTED_UPSTREAM_REF}: ${UPSTREAM_SHORT}"

      - name: Skip if already at upstream target
        id: ancestry
        env:
          UPSTREAM_SHA: ${{ steps.fetch.outputs.upstream_sha }}
        run: |
          if git merge-base --is-ancestor "${UPSTREAM_SHA}" HEAD; then
            echo "Fork already contains upstream target — nothing to sync."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Loop-guard — skip if an open auto-sync PR already exists
        id: loop_guard
        if: steps.ancestry.outputs.skip != 'true'
        env:
          FORCE_SYNC: ${{ inputs.force }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          UPSTREAM_SHORT: ${{ steps.fetch.outputs.upstream_short }}
        run: |
          if [ "${FORCE_SYNC}" = "true" ]; then
            echo "force=true → bypassing loop guard"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          UP_SHORT="${UPSTREAM_SHORT}"
          BRANCH="${SYNC_BRANCH_PREFIX}/${UP_SHORT}"
          # Two-part guard:
          #   (1) Exact head-branch match for the CURRENT upstream target.
          #       Stops a fresh cron tick from re-doing the same broken
          #       sync. Uses --head (exact match) instead of --search to
          #       avoid label drift and string-search ambiguity.
          #   (2) Any other open auto-sync PR on the repo, regardless of
          #       upstream SHA. Two open auto-sync PRs is operational
          #       noise; let the human close/merge the older one first.
          EXACT=$(gh pr list --repo "${REPOSITORY}" --state open --head "${BRANCH}" --json number --jq '.[].number')
          if [ -n "${EXACT}" ]; then
            echo "Open auto-sync PR for upstream ${UP_SHORT} already exists (#${EXACT}). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ANY=$(gh pr list --repo "${REPOSITORY}" --state open --label "${PR_LABEL}" --json number,headRefName --jq '.[] | .number')
          if [ -n "${ANY}" ]; then
            echo "Other open auto-sync PR(s) already exist:"
            gh pr list --repo "${REPOSITORY}" --state open --label "${PR_LABEL}" --json number,headRefName,title --jq '.[]'
            echo "Skipping until they are resolved (close or merge them, then re-dispatch with force=true)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.ancestry.outputs.skip != 'true' && steps.loop_guard.outputs.skip != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.ancestry.outputs.skip != 'true' && steps.loop_guard.outputs.skip != 'true'
        run: npm ci

      - name: Install GitHub Copilot CLI
        if: steps.ancestry.outputs.skip != 'true' && steps.loop_guard.outputs.skip != 'true'
        run: |
          npm install -g "@github/copilot@${COPILOT_CLI_VERSION}"
          copilot --version

      - name: Attempt rebase against upstream target
        id: rebase
        if: steps.ancestry.outputs.skip != 'true' && steps.loop_guard.outputs.skip != 'true'
        run: |
          set +e
          GIT_EDITOR=true git rebase "${UPSTREAM_TARGET_REF}" 2>&1 | tee /tmp/sync/rebase.log
          REBASE_EXIT=${PIPESTATUS[0]}
          set -e
          GITDIR=$(git rev-parse --git-dir)
          REBASE_IN_PROGRESS=false
          if [ -d "${GITDIR}/rebase-merge" ] || [ -d "${GITDIR}/rebase-apply" ]; then
            REBASE_IN_PROGRESS=true
          fi
          if [ "${REBASE_EXIT}" -eq 0 ]; then
            echo "Clean rebase — no conflicts."
            {
              echo "had_conflicts=false"
              echo "needs_pr=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          UNMERGED=$(git ls-files -u | wc -l | tr -d ' ')
          if [ "${UNMERGED}" -gt 0 ]; then
            echo "Rebase produced conflicts (${UNMERGED} unmerged entries). Will invoke Copilot CLI."
            {
              echo "had_conflicts=true"
              echo "needs_pr=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Non-conflict rebase failure (empty commit, hook failure,
          # ref issue). Don't fail the job — capture state and let the PR
          # path open a review PR so a human sees the diagnostics.
          echo "::warning::Rebase exited ${REBASE_EXIT} with no unmerged paths. Likely empty commit / hook / ref issue. Will open PR for review."
          {
            echo "had_conflicts=false"
            echo "needs_pr=true"
            echo "rebase_anomaly=true"
          } >> "$GITHUB_OUTPUT"
          # If a rebase is still in progress (e.g. empty commit waiting
          # for --skip), abort so the rest of the workflow has a clean
          # tree to push.
          if [ "${REBASE_IN_PROGRESS}" = "true" ]; then
            git rebase --abort || true
          fi

      - name: Resolve conflicts with Copilot CLI (headless)
        if: steps.rebase.outputs.had_conflicts == 'true'
        env:
          COPILOT_MODEL: ${{ inputs.model || 'gpt-5.5' }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_PAT }}
        run: |
          # --allow-all     skip per-tool approvals (headless)
          # --no-ask-user   never prompt the human (we have none)
          # --add-dir cwd   ensure CLI has full repo access
          if ! [[ "${COPILOT_MODEL}" =~ ^[A-Za-z0-9._-]{1,80}$ ]]; then
            echo "::error::Invalid Copilot model '${COPILOT_MODEL}'. Model names may only contain letters, numbers, dot, underscore, and dash."
            exit 1
          fi
          copilot \
            -p "$(cat /tmp/sync/copilot-resolve-prompt.md)" \
            --allow-all \
            --no-ask-user \
            --disable-builtin-mcps \
            --secret-env-vars=COPILOT_GITHUB_TOKEN \
            --model "${COPILOT_MODEL}" \
            --add-dir "$(pwd)"
          # Post-conditions. Any of these failing means the agent left the
          # tree in a state we cannot safely push.
          GITDIR=$(git rev-parse --git-dir)
          if [ -d "${GITDIR}/rebase-merge" ] || [ -d "${GITDIR}/rebase-apply" ]; then
            echo "::error::Copilot CLI exited but a rebase is still in progress."
            git status
            exit 1
          fi
          if git ls-files -u | grep -q .; then
            echo "::error::Copilot CLI exited but unmerged paths remain:"
            git ls-files -u
            exit 1
          fi
          # The agent must commit any post-rebase fixes — otherwise
          # verify.sh would pass against a dirty worktree and the push
          # step would push a different (older) state. The prompt makes
          # this explicit; enforce it here.
          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "::error::Copilot CLI left uncommitted changes after rebase:"
            git status --short
            echo "The prompt requires the agent to amend post-rebase fixes into the top commit."
            exit 1
          fi

      - name: Regenerate package-lock.json + refresh node_modules
        if: steps.ancestry.outputs.skip != 'true' && steps.loop_guard.outputs.skip != 'true'
        # Lock file is always derived. Whether the rebase was clean or
        # LLM-resolved, regenerate from the merged package.json so the
        # checksum matches what `npm ci` would produce.
        env:
          GH_TOKEN: ''
          GITHUB_TOKEN: ''
        run: |
          npm install --package-lock-only --ignore-scripts
          if ! git diff --quiet -- package-lock.json; then
            git add package-lock.json
            # Amend it into the top commit so we don't add a stray
            # "regenerate lock" commit on top of the rebase.
            git commit --amend --no-edit
          fi
          # Hard-fail if anything else is dirty: regenerating the lock
          # must not have touched anything else; the LLM/clean-rebase
          # branches must already have produced a clean tree.
          DIRTY=$(git status --porcelain --untracked-files=normal)
          if [ -n "${DIRTY}" ]; then
            echo "::error::Worktree dirty after lock regeneration:"
            git status --short
            exit 1
          fi
          # Upstream may have added/removed/upgraded dependencies. The
          # `npm ci` we ran at the start of the job installed against
          # the OLD lock file. Reinstall now so verify.sh runs build /
          # tests / smoke against the actual dependency set we'd ship.
          npm ci --no-audit --no-fund
          DIRTY=$(git status --porcelain --untracked-files=normal)
          if [ -n "${DIRTY}" ]; then
            echo "::error::Worktree dirty after refreshing node_modules:"
            git status --short
            exit 1
          fi

      - name: Verify post-rebase invariants
        id: verify
        if: steps.ancestry.outputs.skip != 'true' && steps.loop_guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ''
          GITHUB_TOKEN: ''
        run: |
          EXPECTED_HEAD=$(git rev-parse HEAD)
          set +e
          bash scripts/sync/verify.sh | tee /tmp/sync/verify.log
          VERIFY_EXIT=${PIPESTATUS[0]}
          set -e
          ACTUAL_HEAD=$(git rev-parse HEAD)
          if [ "${ACTUAL_HEAD}" != "${EXPECTED_HEAD}" ]; then
            echo "::error::verify.sh changed HEAD from ${EXPECTED_HEAD} to ${ACTUAL_HEAD}."
            VERIFY_EXIT=98
          fi
          echo "verify_exit=${VERIFY_EXIT}" >> "$GITHUB_OUTPUT"
          if [ "${VERIFY_EXIT}" -ne 0 ]; then
            echo "::warning::verify.sh failed (exit ${VERIFY_EXIT}); will open PR for review."
          fi

      - name: Decide outcome
        id: outcome
        if: steps.ancestry.outputs.skip != 'true' && steps.loop_guard.outputs.skip != 'true'
        env:
          HAD_CONFLICTS: ${{ steps.rebase.outputs.had_conflicts }}
          NEEDS_PR: ${{ steps.rebase.outputs.needs_pr }}
          VERIFY_EXIT: ${{ steps.verify.outputs.verify_exit }}
        run: |
          if [ "${HAD_CONFLICTS}" = "false" ] && [ "${NEEDS_PR}" != "true" ] && [ "${VERIFY_EXIT}" = "0" ]; then
            # Clean rebase + no anomaly + green verify → push straight to main.
            echo "mode=fast_forward" >> "$GITHUB_OUTPUT"
          else
            # Any LLM touch, any rebase anomaly, or any red verify opens a PR.
            echo "mode=pull_request" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure push credentials
        if: steps.outcome.outputs.mode == 'fast_forward' || steps.outcome.outputs.mode == 'pull_request'
        env:
          PUSH_PAT: ${{ secrets.RELEASE_PAT }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # Re-inject the PAT now that the Copilot CLI step has completed.
          # `persist-credentials: false` on checkout meant no git remote
          # auth was configured during the LLM step; this restores it
          # for the explicit push that follows.
          git remote set-url origin "https://x-access-token:${PUSH_PAT}@github.com/${REPOSITORY}.git"

      - name: Push to main (fast-forward)
        if: steps.outcome.outputs.mode == 'fast_forward'
        run: |
          # Force-with-lease because the rebase rewrites local commit SHAs
          # (the fork's two commits are replayed on top of new upstream).
          git push --force-with-lease origin HEAD:main

      - name: Push sync branch (PR path)
        id: push_branch
        if: steps.outcome.outputs.mode == 'pull_request'
        env:
          UPSTREAM_SHORT: ${{ steps.fetch.outputs.upstream_short }}
        run: |
          BRANCH="${SYNC_BRANCH_PREFIX}/${UPSTREAM_SHORT}"
          # If a prior failed attempt left the same-named branch, overwrite.
          git push --force origin "HEAD:refs/heads/${BRANCH}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Remove push credentials
        if: always() && (steps.outcome.outputs.mode == 'fast_forward' || steps.outcome.outputs.mode == 'pull_request')
        env:
          REPOSITORY: ${{ github.repository }}
        run: git remote set-url origin "https://github.com/${REPOSITORY}.git"

      - name: Open or update sync PR
        if: steps.outcome.outputs.mode == 'pull_request'
        env:
          COPILOT_MODEL: ${{ inputs.model || 'gpt-5.5' }}
          HAD_CONFLICTS: ${{ steps.rebase.outputs.had_conflicts }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          REPOSITORY: ${{ github.repository }}
          SYNC_BRANCH: ${{ steps.push_branch.outputs.branch }}
          UPSTREAM_REF: ${{ steps.fetch.outputs.upstream_ref }}
          UPSTREAM_SHA: ${{ steps.fetch.outputs.upstream_sha }}
          UPSTREAM_SHORT: ${{ steps.fetch.outputs.upstream_short }}
          VERIFY_EXIT: ${{ steps.verify.outputs.verify_exit }}
        run: |
          if ! [[ "${COPILOT_MODEL}" =~ ^[A-Za-z0-9._-]{1,80}$ ]]; then
            echo "::error::Invalid Copilot model '${COPILOT_MODEL}'. Model names may only contain letters, numbers, dot, underscore, and dash."
            exit 1
          fi
          BRANCH="${SYNC_BRANCH}"
          UP_SHORT="${UPSTREAM_SHORT}"
          DATE=$(date -u +%Y-%m-%d)
          TITLE="chore(sync): upstream ${UP_SHORT} → ${DATE}"
          VERIFY_TAIL=""
          if [ -f /tmp/sync/verify.log ]; then
            # shellcheck disable=SC2016
            VERIFY_TAIL=$(tail -60 /tmp/sync/verify.log | sed 's/`/\\`/g')
          fi
          DIFFSTAT=$(git diff --stat "${UPSTREAM_TARGET_REF}"..HEAD | tail -80)
          STATUS_LINE=""
          if [ "${VERIFY_EXIT}" = "0" ]; then
            STATUS_LINE="✅ \`verify.sh\` passed. Review the diff, then promote this branch to \`main\` with the command below. This is a rebase-style sync branch, so GitHub may show it as conflicting; do **not** use the normal PR merge button."
          else
            STATUS_LINE="❌ \`verify.sh\` failed (exit ${VERIFY_EXIT}). **Do not merge** until the failure is resolved."
          fi
          BODY=$(cat <<EOF
          Automated upstream sync.

          - Upstream ref: \`${UPSTREAM_REF}\`
          - Upstream target: \`${UP_SHORT}\` (\`${UPSTREAM_SHA}\`)
          - Conflicts during rebase: \`${HAD_CONFLICTS}\`
          - Model: \`${COPILOT_MODEL}\`

          ${STATUS_LINE}

          Promotion command after review:

          \`\`\`bash
          git fetch origin ${BRANCH}
          git push --force-with-lease origin FETCH_HEAD:main
          git push origin --delete ${BRANCH}
          \`\`\`

          <details><summary>diffstat (vs upstream target)</summary>

          \`\`\`
          ${DIFFSTAT}
          \`\`\`
          </details>

          <details><summary>verify.sh (tail)</summary>

          \`\`\`
          ${VERIFY_TAIL}
          \`\`\`
          </details>

          _Copilot CLI transcript intentionally not published: the resolver step is secret-bearing._

          ---
          See [docs/SYNC.md](../blob/main/docs/SYNC.md) for the runbook.
          EOF
          )

          # Open the PR if missing; otherwise update title/body in place.
          EXISTING=$(gh pr list \
            --repo "${REPOSITORY}" \
            --head "${BRANCH}" \
            --json number --jq '.[0].number // empty')
          if [ -z "${EXISTING}" ]; then
            LABEL_ARGS=(--label "${PR_LABEL}" --label needs-review)
            if [ "${VERIFY_EXIT}" != "0" ]; then
              LABEL_ARGS+=(--label verify-failed)
            fi
            gh pr create \
              --repo "${REPOSITORY}" \
              --base main \
              --head "${BRANCH}" \
              --title "${TITLE}" \
              --body "${BODY}" \
              "${LABEL_ARGS[@]}"
          else
            gh pr edit "${EXISTING}" \
              --repo "${REPOSITORY}" \
              --title "${TITLE}" \
              --body "${BODY}"
          fi

      - name: Upload sync artifacts
        if: always() && steps.ancestry.outputs.skip != 'true' && steps.loop_guard.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sync-artifacts-${{ steps.fetch.outputs.upstream_short }}
          path: |
            /tmp/sync/rebase.log
            /tmp/sync/verify.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Summarize
        if: always()
        env:
          ANCESTRY_SKIP: ${{ steps.ancestry.outputs.skip }}
          HAD_CONFLICTS: ${{ steps.rebase.outputs.had_conflicts }}
          LOOP_GUARD_SKIP: ${{ steps.loop_guard.outputs.skip }}
          OUTCOME_MODE: ${{ steps.outcome.outputs.mode }}
          UPSTREAM_SHORT: ${{ steps.fetch.outputs.upstream_short }}
          VERIFY_EXIT: ${{ steps.verify.outputs.verify_exit }}
        run: |
          {
            echo "# Upstream sync summary"
            echo
            echo "- Upstream target: \`${UPSTREAM_SHORT}\`"
            echo "- Already at upstream: \`${ANCESTRY_SKIP}\`"
            echo "- Open-PR loop guard hit: \`${LOOP_GUARD_SKIP}\`"
            echo "- Had conflicts: \`${HAD_CONFLICTS}\`"
            echo "- verify.sh exit: \`${VERIFY_EXIT}\`"
            echo "- Outcome: \`${OUTCOME_MODE}\`"
          } >> "$GITHUB_STEP_SUMMARY"
